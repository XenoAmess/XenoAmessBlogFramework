#modified from https://github.com/hexojs/hexo/blob/master/.github/workflows/tester.yml

name: Tester

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tester:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: ['26.x']
      fail-fast: false
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install Hexo
        run: npm install hexo-cli -g
      - name: Get Submodules
        run: |
          git submodule init
          git submodule update
          git submodule foreach git pull origin master
      - name: Install Dependencies
        run: npm install
      - name: Hexo Generate
        run: hexo generate

  docker:
    runs-on: ubuntu-latest
    needs: tester
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Generate image tag
        id: tag
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          SHORT_SHA=${GITHUB_SHA::8}
          echo "tag=${TIMESTAMP}_${SHORT_SHA}" >> "$GITHUB_OUTPUT"
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            xenoamess/xablog:latest
            xenoamess/xablog:${{ steps.tag.outputs.tag }}
            ghcr.io/xenoamess/xablog:latest
            ghcr.io/xenoamess/xablog:${{ steps.tag.outputs.tag }}
