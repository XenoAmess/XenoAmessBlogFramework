apiVersion: apps/v1
kind: Deployment
metadata:
  name: funeral
  namespace: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: funeral
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: funeral
    spec:
      containers:
        - name: funeral
          image: xenoamess/funeral:latest
          ports:
            - name: http
              containerPort: 8911
          resources:
            requests:
              cpu: 100m
              memory: 50Mi
            limits:
              cpu: 10000m
              memory: 5000Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8911
            initialDelaySeconds: 20    # 容器启动后多久开始探测
            timeoutSeconds: 2          # 表示容器必须在2s内做出相应反馈给probe，否则视为探测失败
            periodSeconds: 30          # 探测周期，每30s探测一次
            successThreshold: 1        # 连续探测1次成功表示成功
            failureThreshold: 10        # 连续探测3次失败表示失败
          readinessProbe:
            httpGet:
              path: /
              port: 8911
            initialDelaySeconds: 20    # 容器启动后多久开始探测
            timeoutSeconds: 2          # 表示容器必须在2s内做出相应反馈给probe，否则视为探测失败
            periodSeconds: 30          # 探测周期，每30s探测一次
            successThreshold: 1        # 连续探测1次成功表示成功
            failureThreshold: 10        # 连续探测3次失败表示失败
